    {% include 'header.html' %}
    <div class="container">
        <h1>Create Your Beautiful Basket</h1>
        <form id="create-basket-form" action="/basket/create" method="POST">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter a creative name" required>
            </div>
            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" name="description" rows="4" placeholder="Describe your basket" required></textarea>
            </div>
            <div class="form-group">
                <label for="beers">Choose Beers:</label>
                <select id="beers" name="beers" multiple required>
                    {% for beer in beers %}
                        <option value="{{ beer.id }}">{{ beer.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit">Create Basket</button>
            {% if error %}
            <p>{{error}}</p>
            {% endif %}
        </form>
    </div>
</body>
</html>
